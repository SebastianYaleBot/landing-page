        :root {
            --bg: #070910;
            --surface: #0e1018;
            --surface2: #13161f;
            --border: #1c1f2e;
            --border-bright: #2a2e42;
            --green: #00e87a;
            --green-dim: #00e87a22;
            --yellow: #f5c400;
            --yellow-dim: #f5c40022;
            --blue: #4d9fff;
            --blue-dim: #4d9fff22;
            --red: #ff4d6a;
            --red-dim: #ff4d6a22;
            --purple: #a78bfa;
            --purple-dim: #a78bfa22;
            --dim: #44475a;
            --text: #c8ccd8;
            --text-bright: #e8ecf5;
            --text-muted: #666880;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: 15px;
            line-height: 1.6;
        }

        /* ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 60% 40% at 15% 10%, #0d2a4422 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 85% 5%, #1a0d2e22 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            position: relative;
            z-index: 1;
        }

        /* header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.02em;
        }

        .page-header h1 span {
            color: var(--blue);
        }

        .page-header .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }

        .page-header .meta strong {
            color: var(--text);
        }

        /* stats bar */
        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
            min-width: 130px;
        }

        .stat-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.1rem; }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--text-bright); }

        /* section headers */
        .section {
            margin-bottom: 2.5rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .section-header h2 {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .section-badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 99px;
            font-weight: 600;
        }

        .badge-active { background: var(--green-dim); color: var(--green); }
        .badge-backlog { background: var(--yellow-dim); color: var(--yellow); }
        .badge-blocked { background: var(--red-dim); color: var(--red); }
        .badge-done { background: var(--blue-dim); color: var(--blue); }

        /* project grid */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        /* project card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--border-bright);
            transform: translateY(-2px);
        }

        .card-accent {
            height: 3px;
        }

        .card.status-active .card-accent { background: var(--green); }
        .card.status-backlog .card-accent { background: var(--yellow); }
        .card.status-blocked .card-accent { background: var(--red); }
        .card.status-done .card-accent { background: var(--blue); }

        .card-body {
            padding: 1.2rem;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.6rem;
            gap: 0.5rem;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-bright);
            line-height: 1.3;
        }

        .card-emoji {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .card-tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            background: var(--surface2);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .card-next {
            font-size: 0.72rem;
            color: var(--text-muted);
            max-width: 60%;
            text-align: right;
            line-height: 1.3;
        }

        .card-next strong {
            color: var(--text);
        }

        /* modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border-bright);
            border-radius: 16px;
            max-width: 640px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            position: sticky;
            top: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-bright);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
            padding: 0 0.25rem;
        }

        .modal-close:hover { color: var(--text-bright); }

        .modal-body {
            padding: 1.5rem;
        }

        .detail-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.85rem;
            font-size: 0.85rem;
        }

        .detail-key {
            color: var(--text-muted);
            min-width: 90px;
            flex-shrink: 0;
            padding-top: 0.05rem;
        }

        .detail-val {
            color: var(--text);
            flex: 1;
        }

        .detail-val a {
            color: var(--blue);
            text-decoration: none;
        }

        .detail-section-title {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 1.5rem 0 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }

        .log-entry {
            font-size: 0.82rem;
            color: var(--text-muted);
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            line-height: 1.5;
        }

        .log-entry:last-child { border-bottom: none; }

        .log-entry strong {
            color: var(--text);
        }

        /* status pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.65rem;
            border-radius: 99px;
        }

        .status-pill::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
        }

        .pill-active { background: var(--green-dim); color: var(--green); }
        .pill-backlog { background: var(--yellow-dim); color: var(--yellow); }
        .pill-blocked { background: var(--red-dim); color: var(--red); }
        .pill-done { background: var(--blue-dim); color: var(--blue); }

        /* footer */
        .page-footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        /* mobile */
        @media (max-width: 600px) {
            .wrap { padding: 1.25rem 1rem 3rem; }
            .page-header h1 { font-size: 1.3rem; }
            .project-grid { grid-template-columns: 1fr; }
            .stats { gap: 0.5rem; }
            .stat { min-width: 100px; }
        }
    </style>
</head>

// Render
const now = new Date();
document.getElementById('updated-date').textContent = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
document.getElementById('footer-date').textContent = now.getFullYear();

const counts = { active: 0, blocked: 0, backlog: 0, done: 0 };

function renderCard(p) {
    counts[p.status]++;
    return `<div class="card status-${p.status}" onclick="openModal('${p.id}')">
        <div class="card-accent"></div>
        <div class="card-body">
            <div class="card-top">
                <div>
                    <div style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.2rem;letter-spacing:0.05em;">P-${String(p.num).padStart(3,'0')}</div>
                    <div class="card-title">${p.title}</div>
                </div>
                <div class="card-emoji">${p.emoji}</div>
            </div>
            <div class="card-desc">${p.desc}</div>
            <div class="card-footer">
                <span class="card-tag">${p.category}</span>
                ${p.next ? `<div class="card-next"><strong>Next:</strong> ${p.next}</div>` : ''}
            </div>
        </div>
    </div>`;
}

const grids = { active: '', blocked: '', backlog: '', done: '' };
PROJECTS.forEach(p => { grids[p.status] += renderCard(p); });

Object.keys(grids).forEach(status => {
    document.getElementById(`grid-${status}`).innerHTML = grids[status] || '<div style="color:var(--text-muted);font-size:0.85rem;padding:0.5rem 0">Nothing here yet.</div>';
    document.getElementById(`count-${status}`).textContent = counts[status];
    document.getElementById(`badge-${status}`).textContent = counts[status];
    if (counts[status] === 0) document.getElementById(`section-${status}`).style.display = 'none';
});

// Modal
function openModal(id) {
    const p = PROJECTS.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modal-title').innerHTML = `${p.emoji} <span style="color:var(--text-muted);font-size:0.75rem;font-weight:400;margin-right:0.4rem;">P-${String(p.num).padStart(3,'0')}</span>${p.title}`;
    
    const statusClass = { active: 'pill-active', blocked: 'pill-blocked', backlog: 'pill-backlog', done: 'pill-done' }[p.status];
    const statusLabel = { active: 'Active', blocked: 'Blocked', backlog: 'Backlog', done: 'Done' }[p.status];

    let html = `<div class="detail-row">
        <div class="detail-key">Status</div>
        <div class="detail-val"><span class="status-pill ${statusClass}">${statusLabel}</span></div>
    </div>
    <div class="detail-row">
        <div class="detail-key">Category</div>
        <div class="detail-val">${p.category}</div>
    </div>
    <div class="detail-row">
        <div class="detail-key">Updated</div>
        <div class="detail-val">${p.updated || '—'}</div>
    </div>`;

    if (p.next) {
        html += `<div class="detail-row">
            <div class="detail-key">Next</div>
            <div class="detail-val">${p.next}</div>
        </div>`;
    }

    if (p.details && p.details.length) {
        html += `<div class="detail-section-title">Details</div>`;
        p.details.forEach(d => {
            html += `<div class="detail-row">
                <div class="detail-key">${d.key}</div>
                <div class="detail-val">${d.val}</div>
            </div>`;
        });
    }

    if (p.log && p.log.length) {
        html += `<div class="detail-section-title">Log</div>`;
        [...p.log].reverse().forEach(entry => {
            html += `<div class="log-entry"><strong>${entry.date}</strong> — ${entry.note}</div>`;
        });
    }

    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });
</script>
